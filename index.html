<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026UI/UX王磊作品集</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // 点击计数和编辑按钮显示逻辑
        let clickCount = 0;
        let clickTimer = null;

        // 启动应用逻辑
        window.startAppLogic = () => {
            renderList();
            document.getElementById('loading-overlay').style.display = 'none';
            
            // 添加点击三下显示编辑按钮的逻辑（在右上角空白区域）
            document.addEventListener('click', (e) => {
                // 忽略点击图片查看器和编辑按钮
                if (e.target.closest('#viewer') || e.target.closest('#editButton')) {
                    return;
                }
                
                // 检查是否点击在右上角区域（距离右边和顶部200px范围内）
                const rect = document.body.getBoundingClientRect();
                const isTopRightArea = e.clientX > rect.width - 200 && e.clientY< 200;
                
                if (!isTopRightArea) {
                    return; // 只响应右上角区域的点击
                }
                
                clickCount++;
                
                // 清除之前的计时器
                if (clickTimer) {
                    clearTimeout(clickTimer);
                }
                
                // 设置新的计时器（3秒内必须点击3次）
                clickTimer = setTimeout(() =>{
                    clickCount = 0;
                }, 3000);
                
                // 如果点击了3次，显示编辑按钮
                if (clickCount === 3) {
                    const editButton = document.getElementById('editButton');
                    editButton.style.opacity = '1';
                    editButton.style.pointerEvents = 'auto';
                    
                    // 3秒后自动隐藏
                    setTimeout(() => {
                        editButton.style.opacity = '0';
                        editButton.style.pointerEvents = 'none';
                    }, 3000);
                    
                    clickCount = 0;
                    clearTimeout(clickTimer);
                }
            });
            
            // 点击其他地方隐藏编辑按钮
            document.addEventListener('click', (e) => {
                const editButton = document.getElementById('editButton');
                if (!e.target.closest('#editButton') && editButton.style.opacity === '1') {
                    editButton.style.opacity = '0';
                    editButton.style.pointerEvents = 'none';
                }
            });
        };

        // 页面加载完成后启动
        window.addEventListener('load', () => {
            window.startAppLogic();
        });
    </script>
    <style>
        body { background-color: #000; color: #fff; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .photo-entry { transition: margin 0.3s ease; width: 100%; }
        .img-placeholder { background: #111; min-height: 300px; display: flex; align-items: center; justify-content: center; }
        ::-webkit-scrollbar { width: 0px; }
        #loading-overlay { background: black; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        /* 防止图片拉伸变形 */
        img { 
            object-fit: contain; 
            max-width: 100%; 
            height: auto; 
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div id="loading-overlay" class="fixed inset-0">
        <div class="w-8 h-8 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        <p class="text-[10px] tracking-[0.3em] mt-4 opacity-40 uppercase">加载中...</p>
    </div>

    <!-- 隐藏的编辑按钮，点击三下显示 -->
    <div id="editButton" class="fixed top-4 right-4 z-50 opacity-0 pointer-events-none transition-opacity duration-300">
        <button onclick="promptBatchUrls()" class="bg-black/60 text-white px-4 py-2 rounded-full text-[10px] font-bold tracking-widest transition-all hover:scale-105 uppercase">
            编辑链接
        </button>
    </div>

    <main class="w-full max-w-5xl mx-auto pt-8 pb-32 px-0 md:px-6" id="mainContent">
        <div id="portfolioList" class="flex flex-col items-center"></div>
    </main>

    <div id="viewer" class="fixed inset-0 z-[200] hidden bg-black flex items-center justify-center cursor-zoom-out" onclick="closeViewer()">
        <div id="viewerContent" class="w-full h-full flex items-center justify-center p-4"></div>
    </div>

            "https://pic1.imgdb.cn/item/69c2488f13399d9f5165b91d.png", "https://pic1.imgdb.cn/item/69c2488f13399d9f5165b926.png",
            "https://pic1.imgdb.cn/item/69c2488f13399d9f5165b924.png", "https://pic1.imgdb.cn/item/69c2488f13399d9f5165b91e.png",
            "https://pic1.imgdb.cn/item/69c2489113399d9f5165b931.png", "https://pic1.imgdb.cn/item/69c2489113399d9f5165b930.png",
            "https://pic1.imgdb.cn/item/69c2492913399d9f5165ba98.png", "https://pic1.imgdb.cn/item/69c248c713399d9f5165b99b.png"
        ];

        let portfolioItems = initialUrls.map(url => ({ url }));
        const currentSpacing = 20;

        function renderList() {
            const container = document.getElementById('portfolioList');
            container.innerHTML = portfolioItems.map((item, index) => `
                <div class="photo-entry flex flex-col items-center" style="margin-bottom: ${currentSpacing}px">
                    <div class="relative w-full max-w-4xl overflow-hidden img-placeholder" ondblclick="openViewer(${index})">
                        <img 
                            data-src="${item.url}" 
                            class="w-full h-auto object-contain block opacity-0 transition-opacity duration-700 lazy-image" 
                            onload="this.classList.remove('opacity-0'); this.parentElement.classList.remove('img-placeholder');"
                            onerror="handleImageError(this, '${item.url}', ${index});"
                        >
                    </div>
                </div>
            `).join('');
            
            // 启动延迟加载
            loadImagesSequentially();
        }

        // 顺序加载图片，避免同时加载太多导致失败
        function loadImagesSequentially() {
            const images = document.querySelectorAll('.lazy-image');
            let index = 0;
            
            function loadNext() {
                if (index< images.length) {
                    const img = images[index];
                    img.src = img.dataset.src;
                    img.onload = () =>{
                        img.classList.remove('opacity-0');
                        img.parentElement.classList.remove('img-placeholder');
                        index++;
                        setTimeout(loadNext, 100); // 每100ms加载一张图片
                    };
                    img.onerror = () =>{
                        handleImageError(img, img.dataset.src, index);
                        index++;
                        setTimeout(loadNext, 100);
                    };
                }
            }
            
            loadNext();
        }

        // 图片加载错误处理和重试机制
        window.handleImageError = (img, url, index) => {
            const container = img.parentElement;
            const retryCount = img.retryCount || 0;
            
            if (retryCount< 3) {
                // 第一次重试：使用随机延迟
                img.retryCount = retryCount + 1;
                setTimeout(() =>{
                    img.src = url; // 重新加载图片
                }, 1000 * (retryCount + 1));
            } else {
                // 重试失败，显示错误信息
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-white/50 p-8">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                        <p class="text-sm">图片加载失败</p>
                        <button onclick="retryImage(${index})" class="mt-4 px-4 py-2 bg-white/20 hover:bg-white/30 rounded-full text-xs transition-colors">
                            重试加载
                        </button>
                    </div>
                `;
            }
        };

        // 手动重试加载图片
        window.retryImage = (index) =>{
            const item = portfolioItems[index];
            const container = document.querySelectorAll('.photo-entry')[index].querySelector('.img-placeholder');
            container.innerHTML = `
                <img 
                    src="${item.url}" 
                    class="w-full h-auto object-contain block opacity-0 transition-opacity duration-700" 
                    loading="eager"
                    onload="this.classList.remove('opacity-0'); this.parentElement.classList.remove('img-placeholder');"
                    onerror="handleImageError(this, '${item.url}', ${index});"
                >
            `;
        };

        window.promptBatchUrls = () => {
            const input = prompt("粘贴新的图片链接列表（每行一个）：");
            if (input) {
                const urls = input.split('\n').map(u => u.trim()).filter(u => u);
                portfolioItems = urls.map(url => ({ url }));
                renderList();
            }
        };

        window.openViewer = (index) => {
            const item = portfolioItems[index];
            const viewerContent = document.getElementById('viewerContent');
            viewerContent.innerHTML = `<img src="${item.url}" class="max-h-full max-w-full object-contain" id="viewerImage">`;
            document.getElementById('viewer').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            // 添加鼠标滚轮缩放功能
            const viewerImage = document.getElementById('viewerImage');
            let scale = 1;
            const scaleStep = 0.1;
            const minScale = 0.5;
            const maxScale = 3;
            
            viewerImage.addEventListener('wheel', (e) => {
                e.preventDefault();
                
                // 根据滚轮方向调整缩放比例
                if (e.deltaY< 0) {
                    // 向上滚动：放大
                    scale = Math.min(scale + scaleStep, maxScale);
                } else {
                    // 向下滚动：缩小
                    scale = Math.max(scale - scaleStep, minScale);
                }
                
                // 应用缩放变换
                viewerImage.style.transform = `scale(${scale})`;
            });
        };

        window.closeViewer = () =>{
            document.getElementById('viewer').classList.add('hidden');
            document.body.style.overflow = 'auto';
            // 重置图片缩放
            const viewerImage = document.getElementById('viewerImage');
            if (viewerImage) {
                viewerImage.style.transform = 'scale(1)';
            }
        };
    </script>
